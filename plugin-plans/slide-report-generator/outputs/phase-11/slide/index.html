<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AIコンサルティング事業 中間報告</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
</head>
<body>
  <div class="slider" data-pg-total="5">
    <div class="slide-area">
      <div class="slider__container">
<div data-slide="1" data-type="slide-hero" class="slider__item slide-hero" data-section="section-opening" data-index="0">
  <div class="slider__content">
    <div class="hero-icon"><i class="fa-solid fa-rocket" aria-hidden="true"></i></div>
    <h1>AIで仕事を再発明する</h1>
    <p class="hero-sub">2026 Q2 中間報告</p>
  </div>
</div>
<div data-slide="2" data-type="slide-message" class="slider__item slide-message" data-section="section-opening" data-index="1">
  <div class="slider__content">
    <div class="msg-icon"><i class="fa-solid fa-bullseye" aria-hidden="true"></i></div>
    <p class="main-message">標準化が、品質と速度を両立させる唯一の道である</p>
    <p class="text-note">本日のキーメッセージ</p>
  </div>
</div>
<div data-slide="3" data-type="slide-list" class="slider__item slide-list" data-section="section-status" data-index="2">
  <div class="slider__content">
    <h2>今期の主要トピック</h2>
    <ul class="list">
      
      <li class="list-item">
        <i class="fa-solid fa-chart-line" aria-hidden="true"></i>
        <span class="list-label">案件パイプライン</span>
        <span class="list-desc text-note">新規12件・継続8件で過去最多</span>
      </li>
      
      <li class="list-item">
        <i class="fa-solid fa-sitemap" aria-hidden="true"></i>
        <span class="list-label">標準化プロセス</span>
        <span class="list-desc text-note">プロンプト雛形のv3.0をリリース</span>
      </li>
      
      <li class="list-item">
        <i class="fa-solid fa-trophy" aria-hidden="true"></i>
        <span class="list-label">成功事例</span>
        <span class="list-desc text-note">Eコマース大手で売上15%改善</span>
      </li>
      
      <li class="list-item">
        <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
        <span class="list-label">課題</span>
        <span class="list-desc text-note">シニアコンサルタントの不足が顕在化</span>
      </li>
      
    </ul>
  </div>
</div>
<div data-slide="4" data-type="diagram-prep" class="slider__item slide-diagram-prep" data-section="section-status" data-index="3">
  <div class="slider__content">
    <h2>標準化が必要な理由（PREP）</h2>
    <svg viewBox="0 0 960 540" role="img" aria-label="標準化が必要な理由（PREP）" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--wave-blue)"/></marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--sakura-pink)"/></marker>
    <marker id="arrow-aqua" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--wave-aqua)"/></marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--autumn-yellow)"/></marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--spring-violet)"/></marker>
  </defs>
  <g>
      <rect x="80" y="20" width="800" height="105" rx="10" fill="var(--wave-blue)" opacity="0.9"/>
      <text x="480" y="80.5" text-anchor="middle" fill="var(--bg-dark)" font-size="20" font-weight="700" font-family="'Noto Sans JP', sans-serif"><tspan x="480" dy="0">標準化されたプロンプト雛形を全案件に適用すべきだ</tspan></text>
    </g>
  <g>
      <rect x="120" y="155" width="720" height="105" rx="10" fill="var(--wave-aqua)" opacity="0.9"/>
      <text x="480" y="215.5" text-anchor="middle" fill="var(--bg-dark)" font-size="20" font-weight="700" font-family="'Noto Sans JP', sans-serif"><tspan x="480" dy="0">案件ごとに毎回プロンプトを設計しているため、品質ブレと納期遅延が発生している</tspan></text>
    </g>
  <g>
      <rect x="160" y="290" width="640" height="105" rx="10" fill="var(--sakura-pink)" opacity="0.9"/>
      <text x="480" y="350.5" text-anchor="middle" fill="var(--bg-dark)" font-size="20" font-weight="700" font-family="'Noto Sans JP', sans-serif"><tspan x="480" dy="0">EC事例では雛形適用前は4週間→適用後は2.5週間に短縮（38%短縮）</tspan></text>
    </g>
  <g>
      <rect x="200" y="425" width="560" height="105" rx="10" fill="var(--autumn-yellow)" opacity="0.9"/>
      <text x="480" y="485.5" text-anchor="middle" fill="var(--bg-dark)" font-size="20" font-weight="700" font-family="'Noto Sans JP', sans-serif"><tspan x="480" dy="0">今期中に全案件で雛形v3.0を必須導入する</tspan></text>
    </g>
</svg>
  </div>
</div>
<div data-slide="5" data-type="slide-highlight" class="slider__item slide-highlight" data-section="section-closing" data-index="4">
  <div class="slider__content">
    <h2>本日のサマリー</h2>
    <div class="highlight-num">40%</div>
    <div class="highlight-label">案件納期の短縮幅</div>
    <p class="text-note">雛形v3.0適用案件8件の平均値（2026 Q2実績）</p>
  </div>
</div>
      </div>
    </div>
<nav class="pg-section-nav" aria-label="セクション目次" data-pg-component="section-nav">
  <button type="button" class="pg-section-nav__item"
        data-section="section-opening" data-first-slide="0">
        <span class="pg-section-nav__dot" style="background: var(--accent-blue-vivid);"></span>
        <span class="pg-section-nav__label">オープニング</span>
        <span class="pg-section-nav__bar"></span>
      </button>
      <button type="button" class="pg-section-nav__item"
        data-section="section-status" data-first-slide="2">
        <span class="pg-section-nav__dot" style="background: var(--accent-blue-vivid);"></span>
        <span class="pg-section-nav__label">現状報告</span>
        <span class="pg-section-nav__bar"></span>
      </button>
      <button type="button" class="pg-section-nav__item"
        data-section="section-closing" data-first-slide="4">
        <span class="pg-section-nav__dot" style="background: var(--accent-blue-vivid);"></span>
        <span class="pg-section-nav__label">クロージング</span>
        <span class="pg-section-nav__bar"></span>
      </button>
  
</nav>


<div class="pg-progress" role="progressbar"
     aria-label="プレゼンテーション進捗"
     aria-valuemin="1" aria-valuemax="5" aria-valuenow="1">
  <div class="pg-progress__bar"></div>
</div>


<div class="pg-counter" aria-live="polite" data-pg-component="counter">
  <span class="pg-counter__current">1</span>
  <span class="pg-counter__sep">/</span>
  <span class="pg-counter__total">5</span>
</div>


<div class="pg-controls" data-pg-component="controls">
  <button type="button" class="pg-controls__btn pg-controls__btn--prev"
          aria-label="前のスライド (←)">
    <i class="fas fa-chevron-left" aria-hidden="true"></i>
  </button>
  <button type="button" class="pg-controls__btn pg-controls__btn--next"
          aria-label="次のスライド (→)">
    <i class="fas fa-chevron-right" aria-hidden="true"></i>
  </button>
</div>


<nav class="pg-dots" aria-label="スライド一覧" data-pg-component="dots"
     data-total="5">
  
</nav>
  </div>
  <script src="scripts.js" defer></script>
</body>
</html>
