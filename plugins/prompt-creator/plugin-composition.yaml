# CapabilityBundle 宣言 — plugins/prompt-creator
# 正本スキーマ: ../harness-creator/skills/run-build-skill/references/capability-manifest.schema.json (kindPluginComposition)
# 用途: 7 層プロンプトアーキテクチャの生成・評価・統治を行う orchestrator プラグインの自己記述。
#       harness-creator (run-build-skill Step 7.5) から呼び出され、harness-creator 仕様に完全準拠する。

name: prompt-creator
description: 7 層プロンプトアーキテクチャ (Role/Context/Principles/Workflow/Constraints/Output/Evaluation) で SubAgent 向けプロンプトを生成・評価・統治するメタプラグイン。
kind: plugin-composition
version: 2.1.0
owner: team-platform
since: 2026-05-20
last-audited: 2026-05-24

contract:
  intent: SubAgent / Skill 向けプロンプトを 7 層構造で一貫品質に生成・改良するため、ゴールシーク型 worker + 独立 evaluator + ゲート制御 orchestrator の統一抽象を提供する。
  interface:
    inputs: [user-request, prompt-brief.json, prompt-rubric.json]
    outputs: [seven-layer-prompt.md, prompt-build-trace.json, findings.json, handoff-*.json, completion-report]
  invariant:
    - 全成果物プロンプトは 7 層構造 (L1 基本定義 → L7 ユーザーインタラクション) を持つこと
    - Layer 依存は L7→L6→...→L1 の単方向のみ。逆方向参照は C2 FAIL
    - Layer 5 (エージェント定義) は固定手順を持たず、達成ゴール + 完了チェックリストで宣言すること (ゴールシーク)
    - 既存プロンプト改善は冪等更新 (分解→類似は上書き統合・無ければ新規) で、同一意図要素を 2 つ以上残さないこと
    - evaluator (assign-*) は必ず context:fork で起動し、評価対象を書き換えず findings のみ出力すること (Goodhart 防止)
    - 決定論的処理は python3 スクリプト、LLM は意味判断のみ (Script First)
    - 成果物本文・レビュー・完了レポートは日本語、パラメーター名・JSON キー・CLI 引数は英語のままとすること
    - cross-plugin 参照は harness-creator (run-build-skill / run-elegant-review / run-skill-rubric-governance) と skill-governance-lint (lint scripts 直呼び) への一方向のみ

capabilities:
  # === Skills (kind=skill) ===
  - { kind: skill, ref: skills/run-prompt-create,              tier: core }
  - { kind: skill, ref: skills/run-prompt-elicit,              tier: core }
  - { kind: skill, ref: skills/run-prompt-creator-7layer,      tier: core }
  - { kind: skill, ref: skills/assign-prompt-design-evaluator, tier: core }

  # === Agents (kind=agent) — plugin.json agents 配線と1対1対応 ===
  - { kind: agent, ref: agents/prompt-creator-interview-user,  tier: core }
  - { kind: agent, ref: agents/prompt-creator-generate-prompt, tier: core }
  - { kind: agent, ref: agents/prompt-creator-review-prompt,   tier: core }

dependencies:
  # 主要 DAG。lint-dependency-direction.py で循環検出。
  - { from: skills/run-prompt-create,              to: skills/run-prompt-elicit,              type: calls }
  - { from: skills/run-prompt-create,              to: skills/run-prompt-creator-7layer,      type: calls }
  - { from: skills/run-prompt-create,              to: skills/assign-prompt-design-evaluator, type: calls }
  - { from: skills/run-prompt-elicit,              to: agents/prompt-creator-interview-user,  type: calls }
  - { from: skills/run-prompt-creator-7layer,      to: agents/prompt-creator-generate-prompt, type: calls }
  - { from: skills/assign-prompt-design-evaluator, to: agents/prompt-creator-review-prompt,   type: calls }
  - { from: skills/assign-prompt-design-evaluator, to: skills/run-prompt-creator-7layer,      type: evaluates }
  # cross-plugin (out-going, harness-creator / skill-governance-lint への一方向のみ — invariant で許可済み)
  - { from: skills/run-prompt-create, to: ../harness-creator/skills/run-elegant-review,          type: calls,    note: "Step 4 elegant-review (条件: new or >30 行)" }
  - { from: skills/run-prompt-create, to: ../harness-creator/skills/run-skill-rubric-governance, type: calls,    note: "Step 5 governance (auto_approve 不充足時)" }
  - { from: skills/run-prompt-create,         to: ../skill-governance-lint,                    type: calls,    note: "p0-lint (workflow-manifest phases) で lint scripts 直呼び (plugin.json depends_on と対応)" }
  - { from: skills/run-prompt-creator-7layer, to: ../skill-governance-lint,                    type: calls,    note: "Phase 5 で lint-agent-prompt-section.py 直呼び (plugin.json depends_on と対応)" }
  # cross-plugin (in-coming, called-by — 情報的記述、DAG 逆方向ではない)
  - { from: ../harness-creator/skills/run-build-skill, to: skills/run-prompt-creator-7layer,    type: called-by, note: "Step 7.5 で prompt 生成委譲を受ける (informational)" }

eval_sinks:
  - EVALS.json
  - eval-log/

governance:
  rubric_refs:
    - skills/assign-prompt-design-evaluator/references/prompt-rubric.json
    - ../harness-creator/skills/ref-skill-design-rubric/references/rubric.json
  changelog: CHANGELOG.md
  roadmap: ROADMAP.md
  merge_strategy: deep-merge
  conflict_policy: most-specific-wins

observability:
  metrics:
    - prompt_layer_coverage
    - evaluator_pass_rate
    - idempotent_merge_count
  lessons_path: eval-log/
