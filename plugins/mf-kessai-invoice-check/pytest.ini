[pytest]
# --import-mode=importlib: テストを __init__.py 無しのトップレベル module として
#   個別 import する。pytest 既定の prepend モードは同名 test file や __pycache__
#   残骸で "import file mismatch" を起こすが、importlib モードはこれを構造的に回避する。
# --cov / --cov-fail-under=80: 行カバレッジを計測し 80% 未満で exit 1 (機械ゲート)。
#   ネットワーク層(api/keychain)も mock unit test でカバーする方針 (docs/testing-strategy.md §2)。
#   --cov=hooks: 参照専用 guard (hooks/guard-mfk-readonly.py) も 80% ゲートの母数に含める。
#   guard はファイル名にハイフンを含むため tests/test_guard_mfk_readonly.py が importlib で
#   module ロードし main() を in-process 実行する経路でカバレッジを計上する。
#   pytest-cov は requirements-dev.txt が install 済み。CI は plugin dir へ cd して
#   この pytest.ini を拾うため、ゲートは本 plugin 限定 (他 plugin の pytest には波及しない)。
addopts = --import-mode=importlib
    --cov=lib
    --cov=hooks
    --cov=scripts
    --cov=skills/run-mf-invoice-check/scripts
    --cov=skills/run-mf-invoice-db-setup/scripts
    --cov=skills/run-mf-initial-month-enrich/scripts
    --cov-report=term-missing
    --cov-fail-under=80

# テスト対象ディレクトリ。明示することで誤収集を防ぐ。
testpaths = tests

# pythonpath: 各テストが叩くスクリプト群を import 解決可能にする。
#   従来は各 test file 冒頭の sys.path.insert で個別に通していたが、ここへ一本化し
#   テスト側の定型ボイラープレートを撤去する (SSOT)。
pythonpath =
    lib
    scripts
    skills/run-mf-invoice-db-setup/scripts
    skills/run-mf-invoice-check/scripts
    skills/run-mf-initial-month-enrich/scripts

python_files = test_*.py
python_functions = test_*
