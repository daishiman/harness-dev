<?xml version="1.0" encoding="UTF-8"?>
<!--
  template: persona-card
  required_vars: [name, role, challenge, goal]
  optional_vars: [tools, message]
  use_case: ユーザーペルソナカード。顔アイコン+役割+課題+目標。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Hiragino Sans', sans-serif">
  <style>
    .card { fill: #fff; stroke: #1976d2; stroke-width: 2; }
    .name { font-size: 30px; font-weight: 700; fill: #0d47a1; }
    .role { font-size: 18px; fill: #1976d2; }
    .label { font-size: 16px; font-weight: 700; fill: #555; }
    .body { font-size: 18px; fill: #222; }
    .challenge { fill: #c62828; }
    .goal { fill: #2e7d32; }
    .icon { font-size: 72px; fill: #1976d2; }
    .legend { font-size: 14px; fill: #555; }
  </style>

  <rect x="40" y="40" width="1120" height="480" rx="20" class="card"/>

  <!-- user icon -->
  <circle cx="160" cy="200" r="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="160" y="225" class="icon" text-anchor="middle">&#x4eba;</text>

  <text x="280" y="160" class="name">{{name}}</text>
  <text x="280" y="195" class="role">{{role}}</text>

  <text x="280" y="260" class="label">課題（赤）</text>
  <text x="280" y="295" class="body challenge">{{challenge}}</text>

  <text x="280" y="350" class="label">目標（緑）</text>
  <text x="280" y="385" class="body goal">{{goal}}</text>

  <text x="280" y="440" class="label">使用ツール</text>
  <text x="280" y="470" class="body">{{tools}}</text>

  <text x="60" y="555" class="legend">凡例: 赤=課題 / 緑=目標 / 青=本人情報</text>
  <text x="60" y="580" class="legend">言いたい一言: {{message}}</text>
</svg>
