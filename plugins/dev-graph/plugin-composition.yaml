external_dependencies:
  system-spec-harness:
    version: ">=0.1.0 <1.0.0"
    required_entry_points: [run-system-spec-elicit, run-system-spec-doc-fetch, run-system-spec-compile, assign-system-spec-completeness-evaluator]
  system-dev-planner:
    version: ">=0.1.0 <1.0.0"
    required_entry_points: [run-system-dev-plan, system-dev-plan-architect, system-dev-plan-evaluator, validate-system-plan.py]

eval_sinks: [EVALS.json, eval-log/]
governance:
  merge_strategy: deep-merge
  conflict_policy: most-specific-wins
observability:
  hooks: [PreToolUse/guard-graph-schema, SessionStart/reconcile-task-lifecycle, PostToolUse/reconcile-task-lifecycle, TaskCompleted/reconcile-task-lifecycle]
  metrics: [graph_validation_failures, tracker_pending_retries, active_worktree_leases]
