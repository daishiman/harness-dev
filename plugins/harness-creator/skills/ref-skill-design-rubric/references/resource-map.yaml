# resource-map.yaml — 設計書06 第13条スキーマ準拠
# ref-skill-design-rubric の references/ ファイル索引
resources:
  - file: rubric.json
    topic: Skill 設計評価の機械可読 rubric (正本、L0)
    read_when: evaluator が upstream を解決するとき / rubric_hash を再計算するとき
  - file: rubric-rationale.md
    topic: 各ルールの why と判定境界の補足
    read_when: ルールの意図や FAIL 判定の根拠を確認するとき
  - file: CHANGELOG.md
    topic: rubric の semver 改正履歴
    read_when: rubric_version が変わった経緯を追うとき
