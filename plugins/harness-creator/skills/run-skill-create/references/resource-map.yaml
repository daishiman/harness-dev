# resource-map.yaml — 設計書06 第13条スキーマ準拠
# run-skill-create の Progressive Disclosure 索引。
# 上位 (workflow-manifest, schemas, prompts) は機械可読 contract。references/* は人間向け補助資料。
resources:
  - file: ../workflow-manifest.json
    topic: Step/Gate/Phase 依存とリソース紐付けの機械可読定義
    read_when: フェーズ遷移・条件分岐・委譲先 Skill を確認するとき (最初に読む)
  - file: ../schemas/skill-brief.schema.json
    topic: Step1→Step2 渡しの skill-brief.json 正本スキーマ
    read_when: brief の必須フィールドや型を検証するとき
  - file: ../schemas/handoff.schema.json
    topic: Gate 通過時の handoff JSON 共通スキーマ
    read_when: eval-log/handoff-<step>.json を生成・検証するとき
  - file: ../schemas/findings.schema.json
    topic: orchestrator handoff envelope (evaluator 集約結果の封筒、C1-C4 verdict)。Step 5 producer 正本は ../../run-elegant-review/schemas/findings.schema.json
    read_when: Step 4b/5 出力を検証・集約するとき
  - file: ../schemas/build-trace.schema.json
    topic: run-build-skill が emit する skill-build-trace.json の章別 coverage 検査
    read_when: Step 2 後に Gate 2 前提を確認するとき
  - file: ../schemas/rubric-merge.schema.json
    topic: assign-* の L0/L1/L2 rubric deep-merge 物質化形式
    read_when: rubric 衝突解決を物質化・監査するとき
  - file: ../prompts/R1-elicit.md
    topic: Step 1 ヒアリング委譲プロンプト (R1)
    read_when: run-skill-elicit へ渡す context を組み立てるとき
  - file: ../prompts/R2-gate-review.md
    topic: Gate 1-4 共通 AskUserQuestion テンプレ (R2)
    read_when: ゲート前にユーザー承認を取るとき
  - file: ../prompts/R3-governance-decide.md
    topic: Step 6 solo_operator_mode 自動承認判定プロンプト (R3)
    read_when: governance 承認条件を機械評価するとき
  - file: gate-templates.md
    topic: Gate1〜4 の確認質問テンプレートと手動チェックリスト (Step8 検証 1-3)
    read_when: 各ゲートで何を確認すべきか迷ったとき (詳細手順、人間向け)
  - file: handoff-schema.json
    topic: redirect stub ($ref のみ、正本は schemas/handoff.schema.json)
    read_when: 旧パス参照の互換確認のみ。handoff 仕様は正本 schemas/handoff.schema.json を読むこと
  - file: skill-brief-schema.json
    topic: skill-brief フィールド詳細リファレンス (正本は schemas/skill-brief.schema.json)
    read_when: フィールド description を読みたいとき
