    phase_id: phase1-reset
  - file: ../../../agents/elegant-logical-structural-analyst.md
    phase_id: phase2-parallel
  - file: ../../../agents/elegant-meta-divergent-analyst.md
    phase_id: phase2-parallel
  - file: ../../../agents/elegant-system-strategic-analyst.md
    phase_id: phase2-parallel
  - file: ../../../agents/elegant-improvement-executor.md
    phase_id: phase3-execute
