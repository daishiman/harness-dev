# CapabilityBundle 宣言 — plugins/harness-creator
# 正本スキーマ: skills/run-build-skill/references/capability-manifest.schema.json (kindPluginComposition)
# 用途: harness-creator 自身の dogfooding 兼、CapabilityBundle のリファレンス実装。

name: harness-creator
description: Claude Code のハーネス (Skill / Agent / Hook / Command / Composition / Prompt / Workflow の統一 Capability と評価・統治機構の総体) を構築・評価・統治するメタプラグイン。
kind: plugin-composition
version: 1.3.0+codex.20260713-1
owner: team-platform
since: 2026-05-17
last-audited: 2026-07-13
# 単独配布非対応: marketplace / bundle には含めず、repo を clone した開発環境でのみ .claude/ symlink 経由で利用する。
distribution: repo-bundled

contract:
  intent: Claude Code 拡張資産(Capability)を一貫した品質で生成・改良するため、共通核 + kind 固有スキーマで統一抽象を提供する。
  interface:
    inputs: [user-request, plugin-composition.yaml, rubric.json]
    outputs: [CapabilityManifest, EVALS.json, lessons-learned/*.md, proposals/*.md]
  invariant:
    # enforcement 注記: 機械執行(lint/hook)がある項目はその名前を、無い項目は manual を併記する。
    - "全 Capability は CapabilityManifest を持ち kind を宣言すること (enforcement: hook:PostToolUse-EditWrite/lint-capability-manifest)"
    - "rubric_refs は L0→L1→L2 deep-merge 順を保つこと (enforcement: manual。skill-governance-lint/scripts/lint-rubric-refs-exist.py は存在のみ検証し順序は未検証。manual 維持の理由: rubric.json 側に layer 宣言フィールドが無く順序の機械突合はスキーマ拡張コスト過大、意図的残置)"
    - "elegant-review は Phase1(reset) → Phase2(3並列分析) → Phase3(改善) の順序を保つこと (enforcement: skills/run-elegant-review/scripts/validate-paradigm-coverage.py --phase-order。run dir の Phase1-3 成果物の存在+mtime 順序を機械検査)"
    - "hook の副作用境界(side_effect_scope)は manifest 上で宣言されたもののみ (enforcement: manual。manual 維持の理由: script ヘッダ規約 write-scope は存在するが宣言との自動突合は費用対効果で見送り、意図的残置)"
    - "cross-plugin 参照は repo clone 開発環境で存在確認できる internal plugin に限定すること。harness-creator / prompt-creator は marketplace / bundle 配布対象ではない (allowed_cross_plugins: skill-intake, skill-governance-lint, skill-governance-automation, skill-governance-config, skill-governance-migration, prompt-creator) (enforcement: skill-governance-lint/scripts/lint-external-refs.py --fail-on-external)"
    - "knowledge-loop は単一機構(ref-knowledge-loop 正本)を生成物(Loop A)と harness-creator 自身(Loop B)で自己適用し、並行ストアを作らないこと(SSOT) (enforcement: run-build-skill/scripts/lint-ssot-duplication.py + lint-knowledge-loop.py)"
    - "runtime hook script は自 plugin root 外を import-time に fail-closed 依存しないこと(必須共有モジュールは plugin 内へ vendoring し byte 一致 lint で正本と同期/ローダは fail-soft で raise しない)。単独 install でも全フックが exit 0 を維持する。参照: skills/ref-cross-platform-runtime/references/runtime-portability.md 層1 (enforcement: scripts/lint-runtime-portability.py + scripts/lint-vendored-ssot.py)"
    - "配布 plugin (kind=plugin) を生成し外部依存(API/DB/秘密)の疎通確認手順が要るなら、install 位置を __file__ 相対で自己解決する doctor スクリプトを同梱し README の疎通確認はチャット委譲(/<name>-doctor or 自然文)を一次導線とすること。README bash/sh フェンスに一次手順の裸 $CLAUDE_PLUGIN_ROOT/... / repo 相対 python3 plugins/<name>/... / os.environ 添字を書かず、生パスは開発者補足へ降格し fallback 形 ${CLAUDE_PLUGIN_ROOT:-plugins/<name>} で書く(導入者の生ターミナル空展開事故を防ぐ)。参照: skills/ref-cross-platform-runtime/references/runtime-portability.md 層2 (enforcement: scripts/lint-readme-plugin-root-portability.py)"
    - "全宣言面(lint 集合/完了条件/ゲート/評価 sink)は機械可読正本と対向突合 lint を持つこと。新しい宣言面を追加する際は突合 lint を同時に配線し、突合を持たない manual 宣言は理由注記付きの意図的残置のみ許容する。manual 宣言の残存数は ratchet 監視され増加は CI FAIL (enforcement: skill-governance-lint/scripts/lint-declaration-coverage.py)"
    - "run-skill-live-trial / run-skill-iter-improve (実行 acceptance 系) はローカル開発環境限定であり、量産先 plugin へ配備せず (feedback-deploy の配備対象は run-skill-feedback のみ) リモート CI でも実走しない (D14)。plugin 全体の非配布は distributable:false + NEVER_DISTRIBUTE denylist の二重閉路が保証する (enforcement: scripts/validate-plugin-completeness.py NEVER_DISTRIBUTE + run-build-skill workflow-manifest feedback-deploy 配備対象限定)"
    - "behavioral claim (自走/入れ子 Skill/対話 gate/goal 適合) の受け入れ証拠は live-trial verdict (schema 適合 + skill_dir_tree_sha 一致 + overall.verdict=PASS + tier=live 非降格) + transcript のみとし、静的レビュー成果物を Gate D の収束根拠に混ぜないこと (enforcement: scripts/lint-live-trial-verdict.py — D13 パイロットゲート中は record-only WARN、P3 常設化 go/no-go で --enforce 昇格)"
    - "native surface projection の desired-set owner は scripts/sync-native-surfaces.py (C01) だけとし、ローカル修復は C01 apply→C01 check、CI は C01 check-only とする。user global config / trust store / beads-owned state は書かず、install/enable/trust/re-trust/uninstall は pending_user_gate とする (enforcement: tests/test_native_surface_repo_integration.py)"
    - "native-surfaces.toml は共通 hook delivery と Codex discovery entry の意味論SSOT、plugin manifests/root marketplace は capability/activation identity の正本とし、C01 が結合して `.claude/settings.json`・`.codex/hooks.json`・`.codex/config.toml`・`.agents/plugins/marketplace.json`へ product-specific adapter で投影する。plugin/project delivery owner を1つに限定し、非公式 `.agents/settings.json`・`.agents/{agents,commands,hooks}`・hooks.json+inline [hooks] 重複を禁止する (enforcement: scripts/check-native-surface-parity.py + tests/test_sync_codex_project_settings.py)"

