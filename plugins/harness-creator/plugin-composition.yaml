  # harness-creator の公開 capabilities には含めない。必要な場合は contract-generator plugin を
  # 別 dependency として install する。
  - { kind: skill, ref: skills/assign-skill-design-evaluator, tier: core }
  - { kind: skill, ref: skills/assign-plugin-package-evaluator, tier: core }
  - { kind: skill, ref: skills/delegate-codex-skill-review, tier: extension }
  - { kind: skill, ref: skills/wrap-git-commit-safe,        tier: extension }
  - { kind: skill, ref: skills/ref-pkg-contract,            tier: ref }
  - { kind: skill, ref: skills/ref-skill-design-rubric,     tier: ref }
  - { kind: skill, ref: skills/ref-domain-rubric-template,  tier: ref }
  - { kind: skill, ref: skills/ref-domain-task-spec-rubric, tier: ref }
  - { kind: skill, ref: skills/ref-skill-glossary,          tier: ref }
  - { kind: skill, ref: skills/ref-skill-naming-convention, tier: ref }
  - { kind: skill, ref: skills/ref-claude-code-skill-spec,  tier: ref }
  - { kind: skill, ref: skills/ref-cross-platform-runtime,  tier: ref }
  - { kind: skill, ref: skills/ref-output-routing,          tier: ref }
  - { kind: skill, ref: skills/ref-task-context-map,        tier: ref }
  - { kind: skill, ref: skills/ref-yaml-spec-fetcher,       tier: ref }
  - { kind: skill, ref: skills/ref-knowledge-loop,          tier: ref }

  # === Agents (kind=agent) ===
  - { kind: agent, ref: agents/run-build-skill-subagent,          tier: core }
  - { kind: agent, ref: agents/elegant-reset-observer,            tier: core }
  - { kind: agent, ref: agents/elegant-logical-structural-analyst, tier: core }
  - { kind: agent, ref: agents/elegant-meta-divergent-analyst,    tier: core }
  - { kind: agent, ref: agents/elegant-system-strategic-analyst,  tier: core }
  - { kind: agent, ref: agents/elegant-improvement-executor,      tier: core }

  # === Commands (kind=command) ===
  - { kind: command, ref: commands/install-bundle,    tier: extension }
  - { kind: command, ref: commands/capability-build,  tier: core }
  - { kind: command, ref: commands/capability-review, tier: core }
  - { kind: command, ref: commands/plugin-compose,    tier: core }
  - { kind: command, ref: commands/skill-improve,     tier: core }

  # === Native surface orchestration (kind=script) ===
  - { kind: script, ref: scripts/check-native-surface-parity.py, tier: core }
  - { kind: script, ref: scripts/sync-codex-project-settings.py, tier: core }
  - { kind: script, ref: scripts/sync-native-surfaces.py,        tier: core }
  - { kind: script, ref: scripts/record-task-graph-knowledge.py, tier: core }

  # === Hooks (kind=hook) — plugin.json 配線と1対1対応 ===
  - { kind: hook, ref: "hook:SessionStart/auto-sync-on-session-start", tier: core }
  - { kind: hook, ref: "hook:UserPromptSubmit/cache-refresh",         tier: extension }
  - { kind: hook, ref: "hook:PostToolUse-Skill/notify-skill-end",     tier: extension }
  - { kind: hook, ref: "hook:PostToolUse-Skill/auto-record-lesson",   tier: core }
  - { kind: hook, ref: "hook:PostToolUse-Skill/content-review-queue", tier: core }
  - { kind: hook, ref: "hook:PostToolUse-EditWrite/lint-capability-manifest", tier: core }
  - { kind: hook, ref: "hook:PostToolUse-EditWrite/content-review-queue", tier: core }
  - { kind: hook, ref: "hook:PostToolUse-Edit-rubric/diff-rubric-impact", tier: core }
  - { kind: hook, ref: "hook:PreToolUse-Bash/wrap-git-commit-safe",   tier: extension }
  - { kind: hook, ref: "hook:Stop/elegant-review-trigger",            tier: extension }
  - { kind: hook, ref: "hook:UserPromptSubmit/ref-task-context-map-preload", tier: extension }
  - { kind: hook, ref: "hook:SessionEnd/aggregate-evals",             tier: core }

