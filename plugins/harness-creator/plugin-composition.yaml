    - SessionStart/auto-sync-on-session-start
    - PostToolUse-Skill/auto-record-lesson
    - PostToolUse-Skill/content-review-queue
    - PostToolUse-EditWrite/lint-capability-manifest
    - PostToolUse-EditWrite/content-review-queue
    - PostToolUse-Edit-rubric/diff-rubric-impact
    - SessionEnd/aggregate-evals
