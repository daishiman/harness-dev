    - skills/ref-skill-design-rubric/references/rubric.json
    - skills/ref-domain-rubric-template/references/rubric.json
    - skills/ref-domain-task-spec-rubric/references/rubric.json
  changelog: CHANGELOG.md
  roadmap: ROADMAP.md
  merge_strategy: deep-merge
  conflict_policy: most-specific-wins

observability:
