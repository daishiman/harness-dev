# resource-map.yaml — 設計書06 第13条スキーマ準拠
# run-ubm-goal-setting の Progressive Disclosure 索引。
# references/* は目標設定対話の各 Phase が参照する補助資料。
resources:
  - file: output-formats.md
    topic: 週報/月報/期報の統一ハイブリッド構造テンプレート (公式21項目・公式順) の正本
    read_when: Phase4 で目標設定テンプレートへ整形するとき (最初に読む)
  - file: data-contract.md
    topic: エージェント間データ仕様 (Phase 間 I/O 定義・バリデーションルール)
    read_when: Phase 間でデータを受け渡すとき / validate-goal-output の21項目定義を確認するとき
  - file: thinking-guide.md
    topic: 思考法統合ガイド (思考プロセス定義・実行パターン・質問テンプレート)
    read_when: Phase3 の対話で思考法を質問へ落とし込むとき
  - file: thinking-methods-toolkit.md
    topic: 思考法ツールキット (thinking-guide の補助索引)
    read_when: 思考法の一覧を横断参照するとき
  - file: thinking-process.md
    topic: 思考プロセスの参照断片
    read_when: 対話の分岐ロジックを設計するとき
  - file: version-history.md
    topic: スキルのバージョン履歴 (統一ハイブリッド構造の変遷)
    read_when: 出力仕様の由来・変更経緯を確認するとき
