# resource-map.yaml — 設計書06 第13条スキーマ準拠
# run-ubm-consult の Progressive Disclosure 索引。
# references/* はコーチング型相談の各責務 (R1-R4) が参照する正本文書。
resources:
  - file: consult-frames.md
    topic: 思考フレーム カタログ (GF-xxx・ゴール指向分解/前提検証/トレードオフ二軸/因果深掘り/逆算/やらないこと設計/関係構築ファースト/フェーズ適合 と対応原則 PR-xxx・MS-xxx)
    read_when: R3-frame-consult で提示するフレームを選び出典を引くとき (最初に読む)
  - file: session-record-format.md
    topic: 相談セッション記録の4要素 (考え方提示/引き出し質問/ユーザー言語化/次の一歩) と handoff スキーマ・vault 外置き場契約
    read_when: R4-cocreate-converge で解決策と行動計画を記録するとき / OUT1 の4要素を検証するとき
