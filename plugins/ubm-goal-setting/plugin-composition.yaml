  # [2026-07-11 improvement-plan] YouTube ingest + knowledge/harness graph + consult の主要 DAG。
  # build-order は component-inventory.json の depends_on と一致し非循環 (C01,C08→C06→C05→C07 / C01,C06→C02→C03,C04 / C07→C09→C10)。
  - { from: skills/run-ubm-youtube-ingest, to: agents/youtube-transcript-normalizer, type: calls }
  - { from: skills/run-ubm-youtube-ingest, to: agents/knowledge-relation-extractor,  type: calls }
  - { from: skills/run-ubm-youtube-ingest, to: scripts/validate-knowledge-graph.py,  type: calls }
  - { from: skills/run-ubm-youtube-ingest, to: skills/run-ubm-youtube-ingest/scripts/check-youtube-backfill-completeness.py, type: calls }
  - { from: skills/run-ubm-youtube-ingest, to: skills/run-ubm-youtube-ingest/scripts/run-youtube-sync-oneshot.py,            type: calls }
