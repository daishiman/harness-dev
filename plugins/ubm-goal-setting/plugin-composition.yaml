  - { from: agents/phase3-coordinator, to: skills/run-ubm-goal-setting/prompts/R2-step2-gap-analysis.md,   type: reads }
  - { from: agents/phase3-coordinator, to: skills/run-ubm-goal-setting/prompts/R3-step3-goal-setting.md,   type: reads }
  - { from: agents/phase3-coordinator, to: skills/run-ubm-goal-setting/prompts/R4-step4-action-plan.md,    type: reads }
  - { from: agents/phase3-coordinator, to: skills/run-ubm-goal-setting/prompts/R5-step5-final-check.md,    type: reads }
  - { from: agents/output-formatter,   to: skills/run-ubm-goal-setting/scripts/validate-goal-output.py, type: calls }
  - { from: agents/knowledge-extractor, to: skills/run-ubm-knowledge-sync/scripts/check-knowledge-split.py, type: calls }
  - { from: skills/run-ubm-goal-setting,   to: agents/info-collector,      type: calls }
  - { from: skills/run-ubm-goal-setting,   to: agents/goal-reviewer,       type: calls }
  - { from: skills/run-ubm-goal-setting,   to: agents/phase3-coordinator,  type: calls }
  - { from: skills/run-ubm-goal-setting,   to: agents/output-formatter,    type: calls }
  - { from: skills/run-ubm-knowledge-sync, to: agents/knowledge-extractor, type: calls }
  - { from: skills/run-ubm-knowledge-sync, to: skills/run-ubm-knowledge-sync/scripts/detect-knowledge-updates.py, type: calls }
