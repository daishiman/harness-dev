<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width">
<title>dev-graph</title><style>body{font:14px system-ui;margin:0;background:#0b1020;color:#e5e7eb}header{position:sticky;top:0;padding:16px;background:#111827;z-index:2}input{padding:8px;width:min(420px,70vw)}svg{min-width:1000px;height:296px}path{stroke:#64748b;fill:none;stroke-width:2}.node rect{fill:#1f2937;stroke:#64748b}.node text{fill:#f8fafc}.node .title{fill:#cbd5e1;font-size:12px}.status-done rect{stroke:#22c55e}.hidden{display:none}</style>
<header><strong>dev-graph</strong> <input id="q" aria-label="Filter nodes" placeholder="Filter id/title/status"></header>
<svg viewBox="0 0 1000 296" role="img" aria-label="Task dependency graph"><g class="edges"><path d="M 360 132 C 500 132, 500 204, 640 204"/></g><g class="node status-active" data-id="feature" data-text="feature"><rect x="40" y="36" width="320" height="48" rx="8"/><text x="54" y="57">feature</text><text class="title" x="54" y="75">Feature</text><rect x="640" y="42" width="220" height="36" rx="18"/><text x="660" y="65">active · feature · 1/2</text></g><g class="node status-done" data-id="task-a" data-text="task a"><rect x="40" y="108" width="320" height="48" rx="8"/><text x="54" y="129">task-a</text><text class="title" x="54" y="147">Task A</text><rect x="640" y="114" width="220" height="36" rx="18"/><text x="660" y="137">done · task</text></g><g class="node status-active" data-id="task-b" data-text="task b"><rect x="40" y="180" width="320" height="48" rx="8"/><text x="54" y="201">task-b</text><text class="title" x="54" y="219">Task B</text><rect x="640" y="186" width="220" height="36" rx="18"/><text x="660" y="209">active · task</text></g></svg>
<script type="application/json" id="graph-data">[{"depends_on": [], "id": "feature", "kind": "feature", "parent_feature": null, "progress": {"done": 1, "total": 2}, "status": "active", "title": "Feature"}, {"depends_on": [], "id": "task-a", "kind": "task", "parent_feature": "feature", "progress": null, "status": "done", "title": "Task A"}, {"depends_on": ["task-a"], "id": "task-b", "kind": "task", "parent_feature": "feature", "progress": null, "status": "active", "title": "Task B"}]</script><script>const q=document.querySelector('#q');q.addEventListener('input',()=>{const s=q.value.toLowerCase();document.querySelectorAll('.node').forEach(n=>n.classList.toggle('hidden',!((n.dataset.id+' '+n.dataset.text+' '+n.className.baseVal).toLowerCase().includes(s))))});</script></html>
