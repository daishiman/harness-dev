# resource-map.yaml — 設計書06 第13条スキーマ準拠
# run-skill-create の references/ ファイル索引
resources:
  - file: gate-templates.md
    topic: Gate1〜4 の確認質問テンプレートと手動チェックリスト (Step8 検証 1-3)
    read_when: 各ゲートで何を確認すべきか迷ったとき
  - file: handoff-schema.json
    topic: ゲート通過時の handoff JSON のスキーマ定義
    read_when: eval-log/handoff-<step>.json を生成・検証するとき
  - file: skill-brief-schema.json
    topic: run-skill-elicit から run-build-skill へ渡す skill-brief.json のスキーマ
    read_when: brief の必須フィールドや型を確認するとき
